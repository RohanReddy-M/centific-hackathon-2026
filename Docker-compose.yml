services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./documents:/app/documents

  ui:
    image: python:3.11-slim
    command: bash -c "pip install streamlit requests -q && streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - api